<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | Localbiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d') no-repeat center/cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            top: 0;
            left: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            color: #ff9800;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 30px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ff9800;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: #ff9800;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #e68900;
            transform: translateY(-2px);
        }

        a {
            color: #ff9800;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        a:hover {
            text-decoration: underline;
            color: #e68900;
        }

        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Customer Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <br><br>
        <a href="customer-signup.html">New Customer? Create Account</a>
    </div>

    <script>
        function login() {
            let email = document.getElementById("email").value.trim().toLowerCase();
            let password = document.getElementById("password").value.trim();
            let customers = JSON.parse(localStorage.getItem("customers")) || {};

            if (customers[email] && customers[email].password === password) {
                localStorage.setItem("loggedCustomer", email);
                window.location.href = "customer-dashboard.html";
            } else {
                alert("Wrong Sign In Credentials!");
            }
        }
    </script>
</body>
</html>
