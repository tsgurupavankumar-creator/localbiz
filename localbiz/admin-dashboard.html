<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Localbiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 0;
        }

        .dashboard {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1300px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            color: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logout {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: #f44336;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .logout:hover {
            background: #c62828;
            transform: scale(1.05);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 32px;
            margin-top: 10px;
            font-weight: 700;
        }

        .requests .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .requests .card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.25);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .business-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ff9800;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-approved {
            background: #4CAF50;
            color: white;
        }

        .status-pending {
            background: #ff9800;
            color: white;
        }

        .status-rejected {
            background: #f44336;
            color: white;
        }

        .request-details {
            margin: 12px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .request-details p {
            margin: 5px 0;
            font-size: 0.9rem;
        }

        .rejection-reason {
            background: rgba(244, 67, 54, 0.2);
            border-left: 3px solid #f44336;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .rejection-reason strong {
            color: #ff9800;
        }

        .approval-info {
            background: rgba(76, 175, 80, 0.2);
            border-left: 3px solid #4CAF50;
            padding: 8px 12px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button.approve {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        button.approve:hover {
            background: #2e7d32;
            transform: scale(1.05);
        }

        button.reject {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        button.reject:hover {
            background: #c62828;
            transform: scale(1.05);
        }

        .no-data {
            text-align: center;
            opacity: 0.8;
            padding: 40px;
        }

        /* Modal for rejection reason */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h3 {
            color: #f44336;
            margin-bottom: 15px;
        }

        .modal-content textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin: 15px 0;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        .modal-content textarea:focus {
            outline: none;
            border-color: #f44336;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .confirm-reject {
            background: #f44336;
            color: white;
        }

        .cancel-reject {
            background: #999;
            color: white;
        }

        @media (max-width: 768px) {
            .dashboard { padding: 25px; }
            .button-group { flex-direction: column; }
            button.approve, button.reject { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h2 id="welcome"></h2>
            <button class="logout" onclick="logout()">Logout</button>
        </header>

        <div class="stats">
            <div class="stat-card">
                <p>📊 Total Requests</p>
                <h3 id="totalCount">0</h3>
            </div>
            <div class="stat-card">
                <p>⏳ Pending</p>
                <h3 id="pendingCount">0</h3>
            </div>
            <div class="stat-card">
                <p>✅ Approved</p>
                <h3 id="approvedCount">0</h3>
            </div>
            <div class="stat-card">
                <p>❌ Rejected</p>
                <h3 id="rejectedCount">0</h3>
            </div>
        </div>

        <h3>📋 Customer Appointment Requests</h3>
        <div class="requests" id="requestContainer"></div>
    </div>

    <!-- Modal for Rejection Reason -->
    <div id="rejectModal" class="modal">
        <div class="modal-content">
            <h3>❌ Reject Appointment</h3>
            <p>Please provide a reason for rejecting this appointment:</p>
            <textarea id="rejectionReason" placeholder="E.g., Time slot not available, Business closed on that day, No staff available, etc." rows="4"></textarea>
            <div class="modal-buttons">
                <button class="cancel-reject" onclick="closeRejectModal()">Cancel</button>
                <button class="confirm-reject" onclick="confirmRejection()">Confirm Rejection</button>
            </div>
        </div>
    </div>

    <script>
        // Variables for rejection modal
        let currentRejectIndex = null;
        
        /* 🔐 Security Check */
        let business = localStorage.getItem("loggedBusiness");

        if (!business) {
            alert("Unauthorized Access! Please login.");
            window.location.href = "admin-login.html";
        }

        // Function to refresh dashboard data
        function refreshDashboard() {
            location.reload();
        }

        // Get businesses and requests
        let businesses = JSON.parse(localStorage.getItem("businesses")) || {};
        let requests = JSON.parse(localStorage.getItem("requests")) || [];

        // Display welcome message
        if (businesses[business]) {
            document.getElementById("welcome").innerText = "Welcome " + business + " (" + businesses[business].type + ")";
        } else {
            document.getElementById("welcome").innerText = "Welcome " + business;
        }

        // Filter requests for this business
        let myRequests = requests.filter(r => r.business === business);

        // Calculate stats
        let total = myRequests.length;
        let pending = myRequests.filter(r => r.status === "Pending").length;
        let approved = myRequests.filter(r => r.status === "Approved").length;
        let rejected = myRequests.filter(r => r.status === "Rejected").length;

        document.getElementById("totalCount").innerText = total;
        document.getElementById("pendingCount").innerText = pending;
        document.getElementById("approvedCount").innerText = approved;
        document.getElementById("rejectedCount").innerText = rejected;

        /* Function to open reject modal */
        function openRejectModal(index) {
            currentRejectIndex = index;
            document.getElementById("rejectionReason").value = "";
            document.getElementById("rejectModal").style.display = "flex";
        }

        /* Function to close reject modal */
        function closeRejectModal() {
            document.getElementById("rejectModal").style.display = "none";
            currentRejectIndex = null;
        }

        /* Function to confirm rejection with reason */
        function confirmRejection() {
            let reason = document.getElementById("rejectionReason").value.trim();
            
            if (!reason) {
                alert("⚠️ Please provide a reason for rejecting this appointment.");
                return;
            }
            
            let currentRequests = JSON.parse(localStorage.getItem("requests")) || [];
            
            if (currentRejectIndex !== null && currentRequests[currentRejectIndex]) {
                // Update the appointment status
                currentRequests[currentRejectIndex].status = "Rejected";
                currentRequests[currentRejectIndex].rejectionReason = reason;
                currentRequests[currentRejectIndex].rejectedBy = business;
                currentRequests[currentRejectIndex].rejectedAt = new Date().toLocaleString();
                
                // Save back to localStorage
                localStorage.setItem("requests", JSON.stringify(currentRequests));
                
                alert("❌ Appointment Rejected!\n\nReason: " + reason + "\n\nThe customer will see this rejection reason.");
                closeRejectModal();
                refreshDashboard();
            }
        }

        /* Approve Function */
        function approveRequest(index) {
            let currentRequests = JSON.parse(localStorage.getItem("requests")) || [];
            if (currentRequests[index] && currentRequests[index].status === "Pending") {
                currentRequests[index].status = "Approved";
                currentRequests[index].approvedAt = new Date().toLocaleString();
                currentRequests[index].approvedBy = business;
                localStorage.setItem("requests", JSON.stringify(currentRequests));
                alert("✅ Appointment Approved Successfully!");
                refreshDashboard();
            }
        }

        /* Display Requests */
        let container = document.getElementById("requestContainer");

        if (total === 0) {
            container.innerHTML = `<div class="no-data">📭 No customer requests yet.</div>`;
        } else {
            // Sort requests: Pending first, then Approved, then Rejected
            myRequests.sort((a, b) => {
                const statusOrder = { "Pending": 1, "Approved": 2, "Rejected": 3 };
                return statusOrder[a.status] - statusOrder[b.status];
            });
            
            myRequests.forEach((r, idx) => {
                // Find the actual index in the original requests array
                let originalIndex = requests.findIndex(req => req.requestId === r.requestId);
                if (originalIndex === -1) originalIndex = requests.indexOf(r);
                
                // Get status badge class
                let statusClass = "";
                let statusText = "";
                if (r.status === "Approved") {
                    statusClass = "status-approved";
                    statusText = "✅ Approved";
                } else if (r.status === "Pending") {
                    statusClass = "status-pending";
                    statusText = "⏳ Pending";
                } else {
                    statusClass = "status-rejected";
                    statusText = "❌ Rejected";
                }
                
                // Format business name display
                const businessDisplay = businesses[r.business]?.type || r.business.toUpperCase();
                
                // Build rejection reason HTML if rejected
                let rejectionHtml = "";
                if (r.status === "Rejected" && r.rejectionReason) {
                    rejectionHtml = `
                        <div class="rejection-reason">
                            <strong>⚠️ Rejection Reason:</strong><br>
                            ${r.rejectionReason}<br>
                            <small style="opacity: 0.7;">Rejected on: ${r.rejectedAt || 'N/A'} by ${r.rejectedBy || business}</small>
                        </div>
                    `;
                }
                
                // Build approval info if approved
                let approvalHtml = "";
                if (r.status === "Approved" && r.approvedAt) {
                    approvalHtml = `
                        <div class="approval-info">
                            ✅ Approved on: ${r.approvedAt}
                        </div>
                    `;
                }
                
                container.innerHTML += `
                    <div class="card">
                        <div class="request-header">
                            <span class="business-name">🏢 ${businessDisplay}</span>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        
                        <div class="request-details">
                            <p><strong>👤 Customer:</strong> ${r.email}</p>
                            <p><strong>📅 Date:</strong> ${r.date}</p>
                            <p><strong>⏰ Time:</strong> ${r.time}</p>
                            <p><strong>📝 Message:</strong> ${r.message}</p>
                        </div>
                        
                        ${rejectionHtml}
                        ${approvalHtml}
                        
                        <div class="button-group">
                            ${r.status === "Pending" ? 
                                `<button class="approve" onclick="approveRequest(${originalIndex})">✅ Approve</button>
                                 <button class="reject" onclick="openRejectModal(${originalIndex})">❌ Reject</button>` 
                                : r.status === "Approved" ? 
                                `<span style="color: #4CAF50; padding: 8px;">✓ Already Approved</span>` :
                                `<span style="color: #f44336; padding: 8px;">✗ Rejected - ${r.rejectionReason ? 'Reason provided' : 'No reason given'}</span>`
                            }
                        </div>
                    </div>
                `;
            });
        }

        /* Close modal when clicking outside */
        window.onclick = function(event) {
            let modal = document.getElementById("rejectModal");
            if (event.target === modal) {
                closeRejectModal();
            }
        }

        /* Logout function */
        function logout() {
            localStorage.removeItem("loggedBusiness");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
